name: Weekly YouTube KOL Report

on:
  schedule:
    - cron: '0 1 * * 1'  # 每周一 UTC 1:00 运行 (北京时间 9:00)
  workflow_dispatch:  # 允许手动触发

jobs:
  generate-report:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        pip install feedparser pandas openpyxl requests beautifulsoup4
        
    - name: Generate YouTube KOL report
      run: python weekly_youtube_report.py
      env:
        FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      
    - name: Upload report
      uses: actions/upload-artifact@v3
      with:
        name: youtube-kol-report-${{ github.run_date }}
        path: reports/
        retention-days: 30
